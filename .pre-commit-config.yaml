# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
exclude: prompts/.*.txt
repos:
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v4.6.0
  hooks:
  - id: trailing-whitespace
  - id: end-of-file-fixer
  - id: check-yaml
  - id: check-added-large-files

- repo: https://github.com/PyCQA/flake8
  rev: 7.0.0
  hooks:
  - id: flake8
    additional_dependencies: [flake8-print]

- repo: local
  hooks:
  - id: clang-format
    name: clang-format
    entry: clang-format -i
    language: system
    files: '^(common|examples|ggml|include|pocs|src|tests)/.*\.(c|cc|cpp|cxx|h|hh|hpp|hxx|cu|cuh)$'

- repo: local
  hooks:
  - id: clang-tidy
    name: clang-tidy
    entry: bash -lc 'command -v clang-tidy >/dev/null || { echo "clang-tidy not installed; skipping manual hook" >&2; exit 0; }; exec clang-tidy -p=build_debug "$@"' --
    language: system
    files: '^(common|examples|ggml|include|pocs|src|tests)/.*\.(c|cc|cpp|cxx|h|hh|hpp|hxx|cu|cuh)$'
    require_serial: true
    stages: [manual]
