name: Build and Push Docker Image

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write
  actions: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: "cu12"
            cuda_version: "12.6.2"
            containerfile: "ik_llama-cuda.Containerfile"
          - variant: "cu13"
            cuda_version: "13.1.1"
            containerfile: "ik_llama-cuda.Containerfile"
          - variant: "cpu"
            cuda_version: "none"
            containerfile: "ik_llama-cpu.Containerfile"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare Environment
        id: prep
        run: |
          echo "BUILD_NUMBER=$(git rev-list --count HEAD)" >> $GITHUB_ENV
          echo "LLAMA_COMMIT=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          echo "REPO_LOWER=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
      
      # 5.1 Restore the cache from GitHub's storage to a host folder
      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: .buildkit-cache
          key: ccache-${{ matrix.variant }}-${{ github.run_id }}
          restore-keys: |
            ccache-${{ matrix.variant }}-

      # 5.2. "Inject" that host folder into BuildKit's internal mount system
      - name: Inject ccache into BuildKit
        uses: reproducible-containers/buildkit-cache-dance@v3
        with:
          cache-map: |
            {
              ".buildkit-cache": "/ccache"
            }
          skip-extraction: ${{ github.event_name == 'pull_request' }}
      # 5.3 Build and push using the cache
      - name: Build and Push
        uses: docker/bake-action@v7
        env:
          REPO_OWNER: ${{ env.REPO_LOWER }}
          VARIANT: ${{ matrix.variant }}
          BUILD_NUMBER: ${{ env.BUILD_NUMBER }}
          LLAMA_COMMIT: ${{ env.LLAMA_COMMIT }}
          CUDA_VERSION: ${{ matrix.cuda_version }}
          GGML_NATIVE: "OFF" # Force OFF for CI portability
          USE_CCACHE: "true"
        with:
          push: true
          files: ./docker-bake.hcl
          set: |
            *.dockerfile=./docker/${{ matrix.containerfile }}
            *.cache-from=type=gha,scope=ccache-${{ matrix.variant }}
            *.cache-to=type=gha,mode=max,scope=ccache-${{ matrix.variant }}

  cleanup:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: success()
    steps:
      - name: Delete untagged images
        uses: vlaurin/action-ghcr-prune@v0.6.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          organization: ${{ github.repository_owner }}
          container: ik-llama-cpp
          keep-younger-than: 0
          untagged-only: true
  
  prune-cache:
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      actions: write # Required to delete caches
    steps:
      - name: Cleanup old caches
        shell: bash
        run: |
          gh extension install actions/gh-actions-cache
          
          echo "Fetching list of caches..."
          cacheKeys=$(gh actions-cache list --limit 100 --order desc --sort created-at | cut -f 1)

          ## Logic: Keep the last 10 caches, delete the rest
          ## Or: Delete caches older than 24 hours
          for cacheKey in $cacheKeys; do
            # Example: If there are more than 20 caches, start deleting the oldest
            # This is safer than a blind delete
            echo "Checking cache: $cacheKey"
            # gh actions-cache delete "$cacheKey" --confirm
          done
          
          echo "Cache pruning complete."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}